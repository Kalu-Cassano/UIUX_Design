<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="keyboardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ECDC4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#44A08D;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Keyboard outline with antenna -->
  <g stroke="url(#keyboardGrad)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Antenna -->
    <path d="M 140 30 L 160 10 L 165 35"/>
    
    <!-- Main keyboard body -->
    <rect x="35" y="55" width="130" height="100" rx="12"/>
    
    <!-- Top row of keys (3 keys) -->
    <rect x="50" y="70" width="20" height="20" rx="4"/>
    <rect x="90" y="70" width="20" height="20" rx="4"/>
    <rect x="130" y="70" width="20" height="20" rx="4"/>
    
    <!-- Middle row of keys (3 keys) -->
    <rect x="50" y="100" width="20" height="20" rx="4"/>
    <rect x="90" y="100" width="20" height="20" rx="4"/>
    <rect x="130" y="100" width="20" height="20" rx="4"/>
    
    <!-- Bottom spacebar -->
    <rect x="50" y="130" width="100" height="15" rx="3"/>
  </g>
  
  <!-- Fill keys with gradient -->
  <g fill="url(#keyboardGrad)" opacity="0.3">
    <rect x="50" y="70" width="20" height="20" rx="4"/>
    <rect x="90" y="70" width="20" height="20" rx="4"/>
    <rect x="130" y="70" width="20" height="20" rx="4"/>
    <rect x="50" y="100" width="20" height="20" rx="4"/>
    <rect x="90" y="100" width="20" height="20" rx="4"/>
    <rect x="130" y="100" width="20" height="20" rx="4"/>
    <rect x="50" y="130" width="100" height="15" rx="3"/>
  </g>
</svg>